name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    env:
      # No database is needed for these checks; skip runtime env validation and
      # provide a dummy connection string for `prisma generate` / `next build`.
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://user:password@localhost:5432/prompt_library?schema=public"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Tests are added in M8 (DIG-38/DIG-39); wire them in here, e.g.:
      #   - name: Test
      #     run: npm test

      - name: Build
        run: npm run build
